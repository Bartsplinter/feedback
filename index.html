<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product feedback: POC AI Screening</title>
<style>
  /* Stolt-Nielsen brand variables */
  :root {
    --sn-navy: #041E42;
    --sn-yellow: #F2A900;
    --sn-grey: #63666A;
    --sn-red: #C81034;
    --sn-light-blue: #7A99AC;
    --sn-bg: #f4f4f4;
    --sn-border: #ddddd8;
    --sn-white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: var(--sn-bg); color: var(--sn-navy); min-height: 100vh; }

  /* Top bar with logo */
  .topbar { background: var(--sn-navy); padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: flex-end; }
  .sn-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
  .sn-logo-text { color: #fff; font-family: Arial, sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 0.01em; }
  .sn-logo img { height: 36px; width: auto; }
  .sn-logo-mark { width: 22px; height: 22px; background: var(--sn-red); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sn-logo-mark-inner { width: 10px; height: 10px; background: #fff; }

  /* Yellow accent bar under topbar */
  .accent-bar { height: 4px; background: var(--sn-yellow); }

  .app { max-width: 780px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; gap: 1.5rem; flex-wrap: wrap; }
  .header-card { background: var(--sn-white); border: 1px solid var(--sn-border); border-left: 5px solid var(--sn-yellow); border-radius: 4px; padding: 1.25rem 1.5rem; flex: 1; min-width: 0; }
  .header-card .eyebrow { font-size: 11px; font-weight: 700; color: var(--sn-grey); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .header-card h1 { font-size: 26px; font-weight: 700; color: var(--sn-navy); line-height: 1.15; margin-bottom: 8px; }
  .header-card .subtitle { font-size: 13px; color: var(--sn-grey); margin-bottom: 12px; line-height: 1.5; }
  .dept-label { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: var(--sn-navy); background: var(--sn-yellow); padding: 3px 10px; border-radius: 3px; letter-spacing: 0.02em; }
  .header-tabs { display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-start; gap: 0; flex-shrink: 0; padding-top: 2px; }
  .product-pill { font-size: 11px; padding: 3px 10px; border-radius: 3px; background: var(--sn-navy); color: #fff; font-weight: 700; margin-top: 8px; display: inline-block; letter-spacing: 0.03em; }
  .tabs { display: flex; gap: 4px; background: #e8e8e8; border-radius: 4px; padding: 4px; flex-shrink: 0; }
  .tab { padding: 6px 16px; border: none; background: transparent; border-radius: 3px; cursor: pointer; font-size: 13px; color: var(--sn-grey); font-family: Arial, sans-serif; font-weight: 700; transition: all 0.15s; }
  .tab.active { background: var(--sn-navy); color: #fff; }
  .identity-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem; padding: 10px 14px; background: var(--sn-white); border-radius: 4px; border: 1px solid var(--sn-border); border-left: 4px solid var(--sn-yellow); }
  .identity-bar label { font-size: 13px; color: var(--sn-grey); white-space: nowrap; font-weight: 700; }
  .identity-bar input { flex: 1; background: var(--sn-bg); border: 1px solid var(--sn-border); border-radius: 3px; padding: 6px 10px; font-size: 13px; font-family: Arial, sans-serif; color: var(--sn-navy); }
  .identity-bar input:focus { outline: none; border-color: var(--sn-navy); background: #fff; }
  .mod-badge { font-size: 11px; padding: 2px 8px; border-radius: 3px; background: var(--sn-yellow); color: var(--sn-navy); font-weight: 700; white-space: nowrap; }
  .submit-card { background: var(--sn-white); border: 1px solid var(--sn-border); border-radius: 4px; border-top: 3px solid var(--sn-navy); padding: 1.25rem; margin-bottom: 1.25rem; }
  .submit-card h2 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--sn-navy); }
  .form-row { display: grid; grid-template-columns: 1fr 160px; gap: 8px; margin-bottom: 8px; }
  .form-row input, .form-row select { border: 1px solid var(--sn-border); border-radius: 3px; padding: 8px 10px; font-size: 13px; font-family: Arial, sans-serif; background: var(--sn-bg); color: var(--sn-navy); }
  .form-row input:focus, .form-row select:focus { outline: none; border-color: var(--sn-navy); background: #fff; }
  textarea.desc { width: 100%; border: 1px solid var(--sn-border); border-radius: 3px; padding: 8px 10px; font-size: 13px; font-family: Arial, sans-serif; background: var(--sn-bg); color: var(--sn-navy); resize: vertical; min-height: 64px; margin-bottom: 10px; }
  textarea.desc:focus { outline: none; border-color: var(--sn-navy); background: #fff; }
  .submit-btn { background: var(--sn-navy); color: #fff; border: none; padding: 8px 20px; border-radius: 3px; font-size: 13px; font-family: Arial, sans-serif; cursor: pointer; font-weight: 700; }
  .submit-btn:hover { background: #0a3060; }
  .filters { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn { padding: 4px 12px; border: 1px solid var(--sn-border); border-radius: 3px; background: #fff; font-size: 12px; cursor: pointer; font-family: Arial, sans-serif; color: var(--sn-grey); font-weight: 700; }
  .filter-btn.active { background: var(--sn-navy); color: #fff; border-color: var(--sn-navy); }
  .filter-people-row { display: flex; align-items: center; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-people-label { font-size: 12px; font-weight: 700; color: var(--sn-grey); white-space: nowrap; }
  .filter-clear { font-size: 11px; padding: 3px 10px; border: 1px solid var(--sn-border); border-radius: 3px; background: transparent; cursor: pointer; font-family: Arial, sans-serif; color: var(--sn-grey); margin-left: 4px; }
  .filter-clear:hover { background: var(--sn-bg); color: var(--sn-navy); }
  .feedback-list { display: flex; flex-direction: column; gap: 8px; }
  .feedback-card { background: var(--sn-white); border: 1px solid var(--sn-border); border-radius: 4px; padding: 12px 14px; display: flex; gap: 12px; align-items: flex-start; transition: border-color 0.15s; }
  .feedback-card .card-body { width: 100%; }
  .feedback-card:hover { border-color: var(--sn-light-blue); }
  .feedback-card.drag-over { border: 2px solid var(--sn-yellow); }
  .vote-btn-inline { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border: 1px solid var(--sn-border); border-radius: 3px; background: #fff; cursor: pointer; font-size: 12px; font-family: Arial, sans-serif; color: var(--sn-grey); transition: all 0.15s; font-weight: 700; }
  .vote-btn-inline:hover { background: var(--sn-bg); border-color: var(--sn-navy); color: var(--sn-navy); }
  .vote-btn-inline.voted { background: var(--sn-yellow); border-color: var(--sn-yellow); color: var(--sn-navy); }
  .vote-count-inline { font-weight: 700; }
  .card-body { flex: 1; min-width: 0; }
  .card-top { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
  .card-title { font-size: 14px; font-weight: 700; flex: 1; color: var(--sn-navy); }
  .cat-tag { font-size: 11px; padding: 2px 8px; border-radius: 3px; white-space: nowrap; flex-shrink: 0; font-weight: 700; }
  .cat-design { background: #e0f0e8; color: #085041; }
  .cat-perf { background: #ddeaf5; color: #0C447C; }
  .cat-bug { background: #fce8e8; color: #791F1F; }
  .cat-feature { background: #fef3d8; color: #7a5200; }
  .cat-data { background: #f5e8f0; color: #72243E; }
  .cat-other { background: #ebebeb; color: var(--sn-grey); }
  .card-desc { font-size: 13px; color: var(--sn-grey); line-height: 1.5; margin-bottom: 6px; }
  .card-meta { font-size: 11px; color: #999; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .mod-actions { display: flex; gap: 6px; }
  .mod-btn { font-size: 11px; padding: 2px 8px; border: 1px solid var(--sn-border); border-radius: 3px; background: transparent; cursor: pointer; font-family: Arial, sans-serif; color: var(--sn-grey); font-weight: 700; }
  .mod-btn:hover { background: var(--sn-bg); border-color: var(--sn-navy); color: var(--sn-navy); }
  .mod-btn.danger:hover { background: #fce8e8; color: #791F1F; border-color: #e09090; }
  .drag-handle { font-size: 14px; color: #bbb; cursor: grab; flex-shrink: 0; padding: 2px; user-select: none; }
  .session-header { background: var(--sn-white); border: 1px solid var(--sn-border); border-radius: 4px; border-top: 3px solid var(--sn-navy); padding: 1.25rem; margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .session-header h2 { font-size: 15px; font-weight: 700; color: var(--sn-navy); }
  .session-header p { font-size: 13px; color: var(--sn-grey); margin-top: 2px; }
  .session-actions { display: flex; gap: 8px; }
  .action-btn { padding: 7px 16px; border: 1px solid var(--sn-border); border-radius: 3px; background: #fff; font-size: 13px; cursor: pointer; font-family: Arial, sans-serif; color: var(--sn-grey); font-weight: 700; }
  .action-btn:hover { background: var(--sn-bg); border-color: var(--sn-navy); color: var(--sn-navy); }
  .action-btn.primary { background: var(--sn-navy); color: #fff; border-color: var(--sn-navy); }
  .action-btn.primary:hover { background: #0a3060; }
  .rank-label { font-size: 11px; color: var(--sn-grey); text-align: center; margin-bottom: 8px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
  .ranked-item { display: flex; align-items: center; gap: 10px; }
  .rank-num { width: 24px; height: 24px; border-radius: 50%; background: var(--sn-bg); border: 1px solid var(--sn-border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--sn-grey); flex-shrink: 0; }
  .rank-num.top { background: var(--sn-yellow); color: var(--sn-navy); border-color: var(--sn-yellow); }
  .mod-panel { background: var(--sn-white); border: 1px solid var(--sn-border); border-radius: 4px; padding: 1.25rem; margin-top: 1.5rem; border-top: 3px solid var(--sn-navy); }
  .mod-panel h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; color: var(--sn-navy); }
  .mod-list { display: flex; flex-direction: column; gap: 6px; }
  .mod-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; background: var(--sn-bg); border-radius: 3px; font-size: 13px; }
  .add-mod-row { display: flex; gap: 8px; margin-top: 10px; }
  .add-mod-row input { flex: 1; border: 1px solid var(--sn-border); border-radius: 3px; padding: 7px 10px; font-size: 13px; font-family: Arial, sans-serif; background: var(--sn-bg); color: var(--sn-navy); }
  .add-mod-row input:focus { outline: none; border-color: var(--sn-navy); }
  .empty { text-align: center; padding: 3rem 0; color: #999; font-size: 14px; }
  .devops-section { margin-top: 1.5rem; background: var(--sn-bg); border: 1px solid var(--sn-border); border-radius: 4px; padding: 1.25rem; }
  .devops-section h3 { font-size: 14px; font-weight: 700; margin-bottom: 4px; color: var(--sn-navy); }
  .devops-section p { font-size: 13px; color: var(--sn-grey); margin-bottom: 12px; }
  .devops-preview { font-size: 12px; font-family: 'Cascadia Code', 'Consolas', monospace; background: #fff; border: 1px solid var(--sn-border); border-radius: 3px; padding: 10px 12px; white-space: pre-wrap; color: var(--sn-grey); max-height: 160px; overflow-y: auto; }
  .loading { text-align: center; padding: 4rem 0; color: #999; font-size: 14px; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--sn-navy); color: #fff; padding: 8px 20px; border-radius: 3px; font-size: 13px; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; white-space: nowrap; border-bottom: 3px solid var(--sn-yellow); }
  .toast.show { opacity: 1; }
  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .header { flex-direction: column; }
    .topbar { padding: 0 1rem; }
  }
</style>
</head>

<script>
const CATEGORIES = ['Design', 'Performance', 'Bug', 'Feature', 'Data', 'Other'];
const CAT_CLASS = { Design: 'cat-design', Performance: 'cat-perf', Bug: 'cat-bug', Feature: 'cat-feature', Data: 'cat-data', Other: 'cat-other' };
const STORAGE_KEY = 'vetting_ai_feedback_v1';
const MODS_KEY = 'vetting_ai_moderators_v1';

let state = {
  view: 'feedback',
  userName: localStorage.getItem('feedback_username') || '',
  items: [],
  sessionOrder: [],
  moderators: ['Admin'],
  filterCat: 'All',
  filterPeople: [],
  dragId: null,
  dragOverId: null,
  nextId: 1,
  loaded: false,
  editingId: null,
};

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      state.items = parsed.items || [];
      state.nextId = parsed.nextId || (state.items.length + 1);
    }
  } catch(e) { state.items = []; }
  try {
    const mods = localStorage.getItem(MODS_KEY);
    if (mods) state.moderators = JSON.parse(mods);
  } catch(e) {}
  state.loaded = true;
  render();
}

function saveItems() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ items: state.items, nextId: state.nextId })); }
  catch(e) { showToast('Storage full — could not save'); }
}

function saveMods() {
  try { localStorage.setItem(MODS_KEY, JSON.stringify(state.moderators)); } catch(e) {}
}

function isMod() { return state.moderators.includes(state.userName); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function formatDate(ts) {
  return new Date(ts).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function submitFeedback() {
  const name = state.userName.trim();
  if (!name) { showToast('Please enter your name first'); return; }
  const title = document.getElementById('fi-title').value.trim();
  const desc = document.getElementById('fi-desc').value.trim();
  const cat = document.getElementById('fi-cat').value;
  if (!title) { showToast('Title is required'); return; }
  const item = { id: state.nextId++, title, desc, category: cat, author: name, votes: [], ts: Date.now() };
  state.items.push(item);
  if (state.sessionOrder.length) state.sessionOrder.push(item.id);
  saveItems();
  document.getElementById('fi-title').value = '';
  document.getElementById('fi-desc').value = '';
  render();
  showToast('Feedback saved');
}

function toggleVote(id) {
  const name = state.userName.trim();
  if (!name) { showToast('Enter your name to vote'); return; }
  const item = state.items.find(i => i.id === id);
  if (!item) return;
  const idx = item.votes.indexOf(name);
  if (idx >= 0) item.votes.splice(idx, 1);
  else item.votes.push(name);
  saveItems();
  render();
}

function deleteItem(id) {
  if (!confirm('Remove this feedback item?')) return;
  state.items = state.items.filter(i => i.id !== id);
  state.sessionOrder = state.sessionOrder.filter(i => i !== id);
  saveItems();
  render();
}

function editItem(id) {
  state.editingId = id;
  render();
  const item = state.items.find(i => i.id === id);
  if (!item) return;
  document.getElementById('edit-title-'+id).value = item.title;
  document.getElementById('edit-desc-'+id).value = item.desc;
  document.getElementById('edit-cat-'+id).value = item.category;
}

function cancelEdit() { state.editingId = null; render(); }

function saveEdit(id) {
  const item = state.items.find(i => i.id === id);
  if (!item) return;
  const title = document.getElementById('edit-title-'+id).value.trim();
  if (!title) { showToast('Title cannot be empty'); return; }
  item.title = title;
  item.desc = document.getElementById('edit-desc-'+id).value.trim();
  item.category = document.getElementById('edit-cat-'+id).value;
  item.edited = Date.now();
  state.editingId = null;
  saveItems();
  render();
  showToast('Feedback updated');
}

function startSession() {
  state.sessionOrder = [...state.items].sort((a,b) => b.votes.length - a.votes.length).map(i => i.id);
  state.view = 'session';
  render();
}

function endSession() { state.view = 'feedback'; render(); }

function getADOPayload() {
  const ordered = state.sessionOrder.length
    ? state.sessionOrder.map(id => state.items.find(i => i.id === id)).filter(Boolean)
    : [...state.items].sort((a,b) => b.votes.length - a.votes.length);
  return JSON.stringify(ordered.map((item, idx) => ({
    title: item.title,
    description: item.desc,
    tags: item.category,
    priority: idx + 1,
    votes: item.votes.length,
  })), null, 2);
}

function copyExport() {
  navigator.clipboard.writeText(getADOPayload())
    .then(() => showToast('Copied to clipboard'))
    .catch(() => showToast('Copy failed — please select and copy manually'));
}

function dragStart(id) { state.dragId = id; }
function dragOver(id) { if (id !== state.dragId) { state.dragOverId = id; renderSession(); } }
function drop(id) {
  if (state.dragId === null || state.dragId === id) { state.dragId = null; state.dragOverId = null; return; }
  const from = state.sessionOrder.indexOf(state.dragId);
  const to = state.sessionOrder.indexOf(id);
  state.sessionOrder.splice(from, 1);
  state.sessionOrder.splice(to, 0, state.dragId);
  state.dragId = null; state.dragOverId = null;
  renderSession();
}

function togglePersonFilter(name) {
  const idx = state.filterPeople.indexOf(name);
  if (idx >= 0) state.filterPeople.splice(idx, 1);
  else state.filterPeople.push(name);
  render();
}

function renderFeedback() {
  let filtered = state.filterCat === 'All' ? state.items : state.items.filter(i => i.category === state.filterCat);
  if (state.filterPeople.length > 0) filtered = filtered.filter(i => state.filterPeople.includes(i.author));
  const sorted = [...filtered].sort((a,b) => b.votes.length - a.votes.length);
  const mod = isMod();
  const allAuthors = [...new Set(state.items.map(i => i.author))].sort();
  return `
    <div class="submit-card">
      <h2>Share feedback</h2>
      <div class="form-row">
        <input id="fi-title" placeholder="What's the issue or idea?" />
        <select id="fi-cat">${CATEGORIES.map(c => `<option>${c}</option>`).join('')}</select>
      </div>
      <textarea class="desc" id="fi-desc" placeholder="Describe it briefly (optional)"></textarea>
      <button class="submit-btn" onclick="submitFeedback()">Submit feedback</button>
    </div>
    <div class="filters">
      ${['All', ...CATEGORIES].map(c => `<button class="filter-btn${state.filterCat===c?' active':''}" onclick="state.filterCat='${c}';render()">${c}</button>`).join('')}
    </div>
    ${allAuthors.length > 0 ? `<div class="filter-people-row">
      <span class="filter-people-label">By person:</span>
      ${allAuthors.map(a => `<button class="filter-btn person-btn${state.filterPeople.includes(a)?' active':''}" onclick="togglePersonFilter('${a}')">${a}${a===state.userName?' (you)':''}</button>`).join('')}
      ${state.filterPeople.length > 0 ? '<button class="filter-clear" onclick="state.filterPeople=[];render()">Clear</button>' : ''}
    </div>` : ''}
    <div class="feedback-list">
      ${sorted.length===0 ? '<div class="empty">No feedback yet — be the first to add some</div>' : sorted.map(item => {
        const voted = state.userName && item.votes.includes(state.userName);
        const isOwner = state.userName && item.author === state.userName;
        const isEditing = state.editingId === item.id;
        if (isEditing) {
          return `<div class="feedback-card" style="flex-direction:column;gap:10px;">
            <div class="form-row">
              <input id="edit-title-${item.id}" placeholder="Title" />
              <select id="edit-cat-${item.id}">${CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join('')}</select>
            </div>
            <textarea class="desc" id="edit-desc-${item.id}" placeholder="Description (optional)" style="margin-bottom:0"></textarea>
            <div style="display:flex;gap:8px;">
              <button class="submit-btn" onclick="saveEdit(${item.id})">Save</button>
              <button class="action-btn" onclick="cancelEdit()">Cancel</button>
            </div>
          </div>`;
        }
        return `<div class="feedback-card">
          <div class="card-body">
            <div class="card-top">
              <span class="card-title">${item.title}</span>
              <span class="cat-tag ${CAT_CLASS[item.category]||'cat-other'}">${item.category}</span>
            </div>
            ${item.desc?`<div class="card-desc">${item.desc}</div>`:''}
            <div class="card-meta">
              <button class="vote-btn-inline${voted?' voted':''}" onclick="toggleVote(${item.id})" title="${voted?'Remove vote':'Agree with this feedback'}">👍 ${item.votes.length} ${''}</button>
              <span>${item.author}</span><span>${formatDate(item.ts)}</span>
              ${item.edited?`<span>edited ${formatDate(item.edited)}</span>`:''}
              ${item.votes.length>0?`<span>${item.votes.slice(0,3).join(', ')}${item.votes.length>3?` +${item.votes.length-3}`:''} voted</span>`:''}
              <div class="mod-actions">
                ${isOwner?`<button class="mod-btn" onclick="editItem(${item.id})">Edit</button>`:''}
                ${isOwner||mod?`<button class="mod-btn danger" onclick="deleteItem(${item.id})">Remove</button>`:''}
              </div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
    ${mod ? `
    <div class="mod-panel">
      <h3>Moderator settings</h3>
      <div class="mod-list">
        ${state.moderators.map(m=>`<div class="mod-item"><span>${m}</span>${m!=='Admin'?`<button class="mod-btn danger" onclick="removeMod('${m}')">Remove</button>`:'<span class="mod-badge">owner</span>'}</div>`).join('')}
      </div>
      <div class="add-mod-row">
        <input id="new-mod-input" placeholder="Add moderator by name..." />
        <button class="action-btn" onclick="addMod()">Add</button>
      </div>
    </div>
    <div class="devops-section">
      <h3>Azure DevOps export</h3>
      <p>Copy this JSON payload to create work items in your backlog.</p>
      <div class="devops-preview">${getADOPayload()}</div>
      <button class="action-btn" style="margin-top:10px" onclick="copyExport()">Copy to clipboard</button>
    </div>` : ''}
  `;
}

function addMod() {
  const val = document.getElementById('new-mod-input').value.trim();
  if (!val || state.moderators.includes(val)) return;
  state.moderators.push(val); saveMods(); render();
}

function removeMod(name) {
  state.moderators = state.moderators.filter(x => x !== name); saveMods(); render();
}

function renderSession() {
  const ordered = state.sessionOrder.map(id => state.items.find(i => i.id === id)).filter(Boolean);
  const container = document.getElementById('session-list');
  if (!container) return;
  container.innerHTML = ordered.map((item, idx) => `
    <div class="feedback-card ranked-item${state.dragOverId===item.id?' drag-over':''}"
      draggable="true"
      ondragstart="dragStart(${item.id})"
      ondragover="event.preventDefault();dragOver(${item.id})"
      ondrop="drop(${item.id})">
      <span class="drag-handle">⠿</span>
      <span class="rank-num${idx<3?' top':''}">${idx+1}</span>
      <div class="card-body">
        <div class="card-top">
          <span class="card-title">${item.title}</span>
          <span class="cat-tag ${CAT_CLASS[item.category]||'cat-other'}">${item.category}</span>
        </div>
        ${item.desc?`<div class="card-desc">${item.desc}</div>`:''}
        <div class="card-meta"><span>${item.votes.length} vote${item.votes.length!==1?'s':''}</span><span>${item.author}</span></div>
      </div>
    </div>`).join('');
  const preview = document.getElementById('ado-preview');
  if (preview) preview.textContent = getADOPayload();
}

function render() {
  if (!state.loaded) return;
  const mod = isMod();
  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-card">
        <p class="eyebrow">Product feedback</p>
        <h1>POC AI Screening</h1>
        <p class="subtitle">Share your thoughts and help us prioritise what to build next.</p>
        <span class="dept-label">ST BTI - Business Technologies &amp; Innovation</span>
      </div>
      <div class="header-tabs">
        <div class="tabs">
          <button class="tab${state.view==='feedback'?' active':''}" onclick="state.view='feedback';render()">Feedback</button>
          <button class="tab${state.view==='session'?' active':''}" onclick="state.view==='feedback'?startSession():null">Group session</button>
        </div>
      </div>
    </div>
    <div class="identity-bar">
      <label>Your name:</label>
      <input value="${state.userName}" placeholder="Enter your name to vote and submit"
        oninput="state.userName=this.value;localStorage.setItem('feedback_username',this.value);renderBadge()"
        onblur="render()" />
      <span id="mod-badge-area">${mod?'<span class="mod-badge">moderator</span>':''}</span>
    </div>
    ${state.view==='feedback' ? renderFeedback() : `
      <div class="session-header">
        <div>
          <h2>Group prioritization session</h2>
          <p>Drag items to reorder. Top items will be pushed to Azure DevOps.</p>
        </div>
        <div class="session-actions">
          <button class="action-btn" onclick="endSession()">← Back</button>
          ${mod?`<button class="action-btn primary" onclick="copyExport()">Copy export</button>`:''}
        </div>
      </div>
      <div class="rank-label">Drag to reorder priority</div>
      <div class="feedback-list" id="session-list"></div>
      ${mod?`<div class="devops-section" style="margin-top:1.5rem"><h3>Azure DevOps export</h3><p>Ranked order ready to sync with your backlog.</p><div class="devops-preview" id="ado-preview"></div><button class="action-btn" style="margin-top:10px" onclick="copyExport()">Copy to clipboard</button></div>`:''}
    `}
  `;
  if (state.view==='session') renderSession();
}

function renderBadge() {
  const el = document.getElementById('mod-badge-area');
  if (el) el.innerHTML = isMod() ? '<span class="mod-badge">moderator</span>' : '';
}

loadData();
</script>
</body>
</html>
